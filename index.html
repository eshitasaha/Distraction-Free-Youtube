<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blank YouTube Search & Player</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h2 {
            color: #ff0000;
            margin-bottom: 5px;
        }
        p {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .search-box {
            margin-bottom: 30px;
        }
        input {
            width: 50%;
            padding: 12px 15px;
            font-size: 16px;
            border-radius: 25px;
            border: 1px solid #333;
            background-color: #1e1e1e;
            color: white;
            outline: none;
        }
        input:focus {
            border-color: #ff0000;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }
        button:hover {
            background-color: #cc0000;
        }
        #videoContainer {
            margin-top: 20px;
            margin-bottom: 40px;
        }
        iframe {
            width: 70%;
            height: 450px;
            border: 2px solid #333;
            border-radius: 12px;
            display: none; /* শুরুতে প্লেয়ার লুকানো থাকবে */
        }
        /* সার্চ রেজাল্ট ডিজাইনের অংশ */
        #resultsContainer {
            width: 60%;
            margin: 0 auto;
            text-align: left;
        }
        .video-item {
            display: flex;
            align-items: center;
            background-color: #1e1e1e;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #292929;
        }
        .video-item:hover {
            background-color: #2a2a2a;
            border-color: #ff0000;
        }
        .video-item img {
            width: 120px;
            border-radius: 6px;
            margin-right: 20px;
        }
        .video-title {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
        }
    </style>
</head>
<body>

    <h2>Distraction-Free YouTube Search</h2>
    <p>সরাসরি সার্চ করুন এবং কোনো অ্যাড বা রেকমেন্ডেশন ছাড়া সম্পূর্ণ ফোকাসড হয়ে ভিডিও দেখুন</p>
    
    <div class="search-box">
        <input type="text" id="searchQuery" placeholder="কী দেখতে চান তা এখানে লিখুন...">
        <button onclick="searchYouTube()">Search</button>
    </div>

    <div id="videoContainer">
        <iframe id="youtubePlayer" src="" allowfullscreen></iframe>
    </div>

    <div id="resultsContainer"></div>

    <script>
        // আপনার দেওয়া আসল API Key এখানে সফলভাবে বসানো হয়েছে
        const API_KEY = "AIzaSyDN6P5eittN24ucGhbkhFv2prTlOXz37bg"; 

        // ১. ইউটিউব সার্চ করার ফাংশন
        function searchYouTube() {
            var query = document.getElementById('searchQuery').value;
            var resultsContainer = document.getElementById('resultsContainer');
            
            if (query.trim() === "") {
                alert("দয়া করে কিছু লিখে সার্চ করুন!");
                return;
            }

            // ইউটিউব API থেকে ডাটা আনার জন্য URL তৈরি (৫টি ভিডিও রিকোয়েস্ট করা হচ্ছে)
            var url = `https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=25&q=${encodeURIComponent(query)}&type=video&key=${API_KEY}`;

            // Fetch API ব্যবহার করে ইউটিউব সার্ভার থেকে ডাটা আনা হচ্ছে
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    resultsContainer.innerHTML = ""; // আগের সার্চ রেজাল্ট মুছে ফেলা

                    if (data.items && data.items.length > 0) {
                        // লুপ চালিয়ে প্রতিটি ভিডিওর জন্য HTML লিস্ট তৈরি করা হচ্ছে
                        data.items.forEach(item => {
                            var videoId = item.id.videoId;
                            var title = item.snippet.title;
                            var thumbnail = item.snippet.thumbnails.medium.url;

                            // প্রতিটি ভিডিওর জন্য একটি ক্লিকেবল কার্ড তৈরি
                            var videoHtml = `
                                <div class="video-item" onclick="playVideo('${videoId}')">
                                    <img src="${thumbnail}" alt="${title}">
                                    <div class="video-title">${title}</div>
                                </div>
                            `;
                            resultsContainer.innerHTML += videoHtml;
                        });
                    } else {
                        resultsContainer.innerHTML = "<p style='text-align:center;'>কোনো ভিডিও পাওয়া যায়নি!</p>";
                    }
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    alert("ভিডিও লোড করতে সমস্যা হচ্ছে! আপনার এপিআই কি একটিভ হতে কয়েক মিনিট সময় লাগতে পারে।");
                });
        }

        // ২. ভিডিও প্লে করার ফাংশন (ক্লিক করলে ওপরে ডিস্ট্রাকশন-ফ্রি প্লে হবে)
        function playVideo(videoId) {
            var player = document.getElementById('youtubePlayer');
            player.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
            player.style.display = "inline-block"; // প্লেয়ারটি স্ক্রিনে দৃশ্যমান হবে
            
            // স্ক্রিনটি স্বয়ংক্রিয়ভাবে স্ক্রোল হয়ে ওপরে প্লেয়ারের কাছে চলে যাবে
            window.scrollTo({ top: 0, behavior: 'smooth' }); 
        }
    </script>

</body>
</html>
